name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      # build before typecheck: runtime/sdk-js import @portixone/* packages
      # via their published dist/*.d.ts, which only exist after building
      # packages/* first (no TS project references yet).
      - run: npm run build
      - run: npm run typecheck
